name: Refresh live prices

on:
  # GitHub's native schedule trigger was already replaced by cron-job.org's
  # external dispatch on 2026-07-16 for reliability. The schedule block
  # below was left in as a backup but never actually fires in practice
  # (every observed run is workflow_dispatch) — it was also the root cause
  # of the git-push race condition fixed on 2026-07-24 (two trigger paths
  # occasionally overlapping). Removed rather than left as dead, misleading
  # config.
  workflow_dispatch: {}

concurrency:
  group: refresh-prices
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch quotes and write prices.json
        run: node scripts/refresh-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --cached --quiet && exit 0
          git commit -m "Update live prices"
          for attempt in 1 2 3; do
            if git pull --rebase; then
              git push && exit 0
            fi
            # A real content conflict (two runs racing, not just a
            # fast-forward miss) leaves the repo mid-rebase; without
            # resolving it, every later retry fails the same way instead of
            # making progress. prices.json is pure auto-generated data with
            # no meaningful merge, so on conflict keep this run's freshly
            # fetched version ("theirs" under rebase = the commit being
            # replayed) and finish the rebase; next loop iteration pushes it.
            if git status --short | grep -q '^UU'; then
              git checkout --theirs data/prices.json
              git add data/prices.json
              git rebase --continue --no-edit || git rebase --abort
            else
              git rebase --abort 2>/dev/null || true
            fi
            sleep $((attempt * 10))
          done
          exit 1
