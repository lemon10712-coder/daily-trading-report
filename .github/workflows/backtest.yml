name: Daily backtest

on:
  schedule:
    # 14:20 / 14:40 / 15:00 Taipei. The script is idempotent; later runs
    # provide automatic retry if the minute-data source is temporarily late.
    - cron: '20,40 6 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: daily-backtest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run regression tests
        run: node --test tests/backtest.test.js

      - name: Run backtest
        run: node scripts/backtest.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backtest-latest.json data/backtest/ data/strategy-learning.json
          git diff --cached --quiet && exit 0
          git commit -m "Backtest for $(date +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep $((attempt * 10))
          done
          exit 1
