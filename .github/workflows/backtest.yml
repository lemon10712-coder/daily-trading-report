name: Daily backtest

on:
  schedule:
    # 14:10 / 14:20 / 14:30 Taipei (UTC+8) = 06:10 / 06:20 / 06:30 UTC，收盤後留緩衝重試三次，
    # 避免單次執行時 prices.json 的收盤快照還沒 commit 完成就撲空。
    - cron: '10,20,30 6 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backtest
        run: node scripts/backtest.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/backtest-latest.json data/backtest/
          git diff --cached --quiet || git commit -m "Backtest for $(date +%Y-%m-%d)"
          git push
