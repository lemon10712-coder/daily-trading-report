name: Server-side validate report

# 雲端 agent 產生報告的沙盒環境連不到證交所 API，只能做「沒有前收盤價可比對」的弱驗證。
# GitHub Actions 的 runner 連得到（refresh-prices.yml 這幾週都跑得很順），所以在報告
# push 上來之後，用這裡重新做一次真正連網的健檢，抓到問題就自動補上顯眼警示。
on:
  workflow_dispatch: {}
  push:
    paths:
      - 'data/latest.json'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    # 避免這個 workflow 自己 commit 的補丁又觸發自己，造成無限迴圈
    if: github.event.head_commit.author.name != 'report-validate-bot'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run validation (this runner has real internet access)
        run: node scripts/validate-report.js || true

      - name: Patch report if real errors were found
        run: node scripts/apply-validation-flag.js

      - name: Commit and push if changed
        run: |
          git config user.name "report-validate-bot"
          git config user.email "report-validate-bot@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet && exit 0
          git commit -m "Auto-flag: server-side validation found issues"
          for attempt in 1 2 3; do
            git pull --rebase && git push && exit 0
            sleep $((attempt * 10))
          done
          exit 1
