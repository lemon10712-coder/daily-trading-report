name: Daily automation health

on:
  # GitHub's native schedule trigger runs unreliably late in practice (same
  # issue fixed for refresh-prices.yml on 2026-07-16, and for backtest.yml on
  # 2026-07-24). Dispatched externally by cron-job.org instead at 09:20 and
  # 16:00 Taipei; see charles-agent/.secrets/cron-job-org.md.
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify current trading-day artifacts
        id: check
        run: node scripts/check-automation-health.js

      - name: Notify LINE on failure
        if: failure()
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          node scripts/notify-line.js "⚠️ 當沖報告自動化健檢失敗，可能今天的早報／回測／PDF 有一項沒有正常產生，麻煩去網站確認：https://lemon10712-coder.github.io/daily-trading-report/"
